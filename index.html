<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sons relaxantes</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎶%3C/text%3E%3C/svg%3E"
    />
    <meta
      name="description"
      content="Blanket Web: misture sons ambientes online para foco, relaxamento e sono."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header glass">
        <p class="eyebrow">Experiência sonora imersiva</p>
        <h1>Deck de áudios</h1>
        <p>Sons relaxantes</p>
      </header>

      <section>
        <ul id="soundList" class="sound-list" aria-label="Lista de sons"></ul>
      </section>
    </main>

    <aside class="dock glass" aria-label="Dock fixa de reprodução">
      <button
        id="dockToggleAll"
        class="dock__btn dock__btn--play"
        type="button"
        aria-label="Tocar ou pausar todos os sons"
        aria-pressed="false"
      >
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="28" height="28" hidden>
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>

      <div class="dock__volume-area">
        <button
          id="dockVolumeToggle"
          class="dock__btn"
          type="button"
          aria-label="Abrir controle de volume"
          aria-expanded="false"
          aria-controls="dockVolumePanel"
        >
          <svg class="icon-volume" viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </button>

        <div id="dockVolumePanel" class="dock__volume-panel glass" hidden>
          <label class="dock__volume-label" for="masterVolume">Volume geral</label>
          <input
            id="masterVolume"
            class="dock__volume-input"
            type="range"
            min="0"
            max="100"
            value="70"
            aria-label="Volume geral"
          />
          <output id="masterVolumeValue" for="masterVolume">70%</output>
        </div>
      </div>
    </aside>

    <template id="soundItemTemplate">
      <li class="sound-card glass" tabindex="0" role="button" aria-pressed="false">
        <div class="sound-card__top">
          <h2 class="sound-card__title"></h2>
        </div>
        <label class="sound-card__volume-wrap">
          <span>Volume</span>
          <div class="range-wrap">
            <input class="sound-card__volume" type="range" min="0" max="100" value="70" />
            <output class="sound-card__volume-value">70%</output>
          </div>
        </label>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
